<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; width: 100%; scroll-behavior: auto; }

:root {
  /* Base — extraída do logotipo */
  --ink:        #1A2744;
  /* Azul-petróleo escuro (lettering LABIAN) */
  --ink-mid:    #243560;
  --ink-light:  #2E4A80;
  /* Assinatura do logo: gradiente ciano → verde-limão */
  --cyan:       #00C8D4;
  --lime:       #6FD94A;
  --cyan-glow:  rgba(0,200,212,0.22);
  --lime-glow:  rgba(111,217,74,0.18);
  /* Acento quente para contraste */
  --coral:      #FF5A5F;
  --coral-glow: rgba(255,90,95,0.18);
  /* Neutros */
  --off:        #F2F6FF;
  --white:      #FFFFFF;
  --radius:     14px;
  --radius-lg:  22px;

  /* Gradiente-assinatura (replica o "B" da logo) */
  --grad-brand: linear-gradient(135deg, var(--cyan) 0%, var(--lime) 100%);
  --grad-dark:  linear-gradient(145deg, var(--ink) 0%, var(--ink-mid) 50%, #1C3468 100%);
}

body { font-family: 'Space Grotesk', sans-serif; background: var(--off); color: var(--ink); }

/* ═══════════════════════ NAVBAR FLUTUANTE (GLASSMORPHISM) ═══════════════════════ */
.floating-nav {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(26, 39, 68, 0.45); /* Base escura translúcida */
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(0, 200, 212, 0.25); /* Borda ciano sutil */
  border-radius: 999px;
  padding: 6px;
  z-index: 9999;
  box-shadow: 0 16px 32px rgba(12, 22, 48, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  opacity: 0;
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
  will-change: transform, opacity;
}
.floating-nav.visible {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
.nav-link {
  position: relative;
  color: rgba(242, 246, 255, 0.65);
  text-decoration: none;
  font-size: 0.88rem;
  font-weight: 600;
  padding: 8px 18px;
  border-radius: 999px;
  transition: color 0.3s ease;
  z-index: 2;
  letter-spacing: 0.02em;
}
.nav-link:hover { color: var(--white); }
.nav-link.active { color: var(--ink); }

/* Indicador Pill Deslizante */
.nav-pill {
  position: absolute;
  top: 6px;
  bottom: 6px;
  left: 0;
  background: var(--grad-brand);
  border-radius: 999px;
  z-index: 1;
  pointer-events: none;
  box-shadow: 0 4px 12px var(--cyan-glow);
  transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), width 0.5s cubic-bezier(0.23, 1, 0.32, 1);
  opacity: 0;
}

@media (max-width: 768px) {
  .floating-nav {
    top: auto;
    bottom: 24px;
    transform: translateX(-50%) translateY(100px);
    gap: 0px;
    padding: 4px;
  }
  .nav-link { padding: 8px 14px; font-size: 0.8rem; }
}

/* ═══════════════════════ CANVAS ═══════════════════════ */
#particle-canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}

/* ═══════════════════════ HEADER GIGANTE (MODELO) ═══════════════════════ */
.site-header {
  position: relative;
  background: var(--white);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: clamp(60px, 10vh, 100px);
  z-index: 10;
}

.logo-center {
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  margin-bottom: clamp(40px, 7vh, 80px);
}
.logo-center img {
  width: clamp(280px, 45vw, 600px); 
  height: auto; 
  object-fit: contain;
}
.header-subtitle {
  color: var(--ink);
  font-size: clamp(0.7rem, 1vw, 1rem);
  font-weight: 500;
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-top: 12px;
  text-align: center;
}

.logo-bottom-right { 
  width: 100%; 
  max-width: 1600px;
  display: flex; 
  align-items: center; 
  justify-content: flex-end;
  gap: clamp(10px, 2vw, 20px); 
  flex-wrap: wrap;
  padding: 0 clamp(20px, 5vw, 60px) 15px 0;
}
.logo-bottom-right img { 
  height: clamp(32px, 4vw, 48px); 
  width: auto; 
  object-fit: contain;
}
.header-badge {
  background: var(--grad-dark);
  color: var(--cyan);
  font-size: clamp(9px, 1.1vw, 11px);
  font-weight: 600; 
  letter-spacing: .08em;
  padding: 8px 16px; 
  border-radius: 99px;
  text-transform: uppercase;
}

/* ═══════════════════════ HERO ═══════════════════════ */
.hero {
  position: relative;
  background: var(--grad-dark);
  padding: 15px clamp(20px, 5vw, 48px) clamp(60px, 10vh, 100px);
  text-align: center; overflow: hidden;
  min-height: 70vh;
  display: flex; flex-direction: column;
  align-items: center; 
  justify-content: flex-start;
}

.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,200,212,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(111,217,74,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
  transform: perspective(800px) rotateX(12deg) scale(1.3);
  transform-origin: 50% 100%;
  will-change: transform;
}

.hero-orb-1 {
  position: absolute;
  top: -100px; right: -80px;
  width: clamp(280px, 48vw, 480px); height: clamp(280px, 48vw, 480px);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,200,212,0.20) 0%, transparent 68%);
  animation: pulse 6s ease-in-out infinite;
}
.hero-orb-2 {
  position: absolute; bottom: -130px; left: -60px;
  width: clamp(240px, 38vw, 380px);
  height: clamp(240px, 38vw, 380px);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(111,217,74,0.15) 0%, transparent 68%);
  animation: pulse 8s ease-in-out infinite 2s;
}
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.7} }

.hero-tag {
  display: inline-flex;
  align-items: center; gap: 8px;
  background: rgba(0,200,212,0.10);
  border: 1px solid rgba(0,200,212,0.32);
  color: #7EEAF0;
  font-size: clamp(10px, 1.4vw, 12px); font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 8px 18px; border-radius: 99px;
  margin: 0 0 22px 0;
  position: relative; z-index: 2; opacity: 0;
}
.hero-tag::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: var(--lime);
  display: inline-block;
  animation: blink 2s ease-in-out infinite;
  box-shadow: 0 0 8px var(--lime);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.hero h1 {
  font-size: clamp(2.4rem, 5.8vw, 5.2rem);
  font-weight: 700; line-height: 1.08;
  margin-top: 30px;
  margin-bottom: 22px;
  position: relative; z-index: 2;
  opacity: 0; transform: translateY(30px);
}
.line-1 {
  display: block;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.82) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.line-2 {
  display: block;
  font-size: clamp(1.2rem, 2.8vw, 2.2rem);
  margin-top: 10px;
  background: linear-gradient(90deg, var(--cyan) 0%, var(--lime) 55%, var(--cyan) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  background-size: 200% 100%;
  animation: textFlow 5s linear infinite;
}
@keyframes textFlow { 0%{background-position:0%} 100%{background-position:200%} }

.hero p {
  font-size: clamp(1rem, 1.9vw, 1.25rem);
  line-height: 1.75; max-width: 900px;
  margin: 0 auto 36px;
  color: rgba(242,246,255,0.80);
  position: relative; z-index: 2;
  opacity: 0; transform: translateY(16px);
}

.hero-cta-group
